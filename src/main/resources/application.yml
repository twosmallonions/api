spring:
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: "http://localhost:8080/realms/tso"
          jws-algorithms: ["RS256"]
  application:
    name: api
  datasource:
    url: jdbc:postgresql://localhost:5432/tso_api?user=postgres&password=dev
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        format_sql: true
server:
  port: 8000
logging:
  level:
    web: debug