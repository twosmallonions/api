spring:
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 11MB
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${OIDC_ISSUER}
          jws-algorithms: ["RS256"]
          audiences: "tso_api"
  application:
    name: api
  datasource:
    url: ${DB_JDBC_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        format_sql: true
server:
  port: 8000
logging:
  level:
    web: debug
    org.springframework.transaction: DEBUG
    org.springframework.orm.jpa: DEBUG
    org.springframework.test.context.support: DEBUG
    org.springframework.boot.context.config: DEBUG
    org.springframework.security.oauth2: TRACE
    org.springframework.security.oauth2.server.resource.authentication: DEBUG
    org.springframework.security.oauth2.jwt: DEBUG
tso:
  upload:
    endpoint: ${USER_IMAGE_ENDPOINT}
    user-image-bucket: ${USER_IMAGE_BUCKET}
    aws-access-key: ${AWS_ACCESS_KEY}
    aws-secret-key: ${AWS_SECRET_KEY}
    imgproxy-base-url: http://127.0.0.1:8081
    region: auto
  scraper:
    py:
      host: 127.0.0.1
      port: 50051
      client-certificate: ""
      client-key: ""
      root-ca: ""

management:
  server:
    port: 9517